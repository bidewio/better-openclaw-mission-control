# ──────────────────────────────────────────────────────────────────────────────
# Mission Control — Build & Publish Docker Image
#
# Builds a multi-arch Docker image and pushes it to GitHub Container Registry.
# The pre-built image supports runtime VITE_CONVEX_URL injection via the
# entrypoint script, so users can point it at any Convex backend.
#
# Image: ghcr.io/bidewio/mission-control
#
# Tags:
#   - latest          (on push to main)
#   - v1.2.3          (on release)
#   - v1.2            (on release)
#   - abc1234         (git sha, always)
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Publish Docker Image

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Additional image tag"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mission-control

permissions:
  contents: read
  packages: write

jobs:
  # ── Guard: typecheck before building ──────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  # ── Docker build (only runs if typecheck passes) ─────────────────────────
  build-and-push:
    needs: typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=${{ steps.pkg.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_CONVEX_URL=__MISSION_CONTROL_CONVEX_URL_PLACEHOLDER__
